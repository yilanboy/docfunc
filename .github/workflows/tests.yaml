name: Run Tests

on:
  workflow_dispatch:
    inputs:
      name:
        description: Who to greet
        default: Allen
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  tests:
    name: Test in php ${{ matrix.php }} version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php:
          - 8.4
          - 8.5
    env:
      APP_NAME: DocFunc
      APP_URL: "https://docfunc.test"
      FILESYSTEM_DISK: public
      SCOUT_PREFIX: dev_posts
      ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
      ALGOLIA_SECRET: ${{ secrets.ALGOLIA_SECRET }}
      CAPTCHA_SITE_KEY: 1x00000000000000000000BB
      CAPTCHA_SECRET_KEY: 1x0000000000000000000000000000000AA

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Docs: https://github.com/shivammathur/setup-php
      - name: Setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # https://laravel.com/docs/9.x/deployment#server-requirements
          coverage: xdebug

      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.8.1"

      - name: Get composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Generate vite manifest
        run: |
          npm ci
          npm run build

      - name: Prepare the application
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate

      - name: Run the static analysis
        run: vendor/bin/phpstan analyse --memory-limit=2G

      - name: Run Laravel pint
        run: vendor/bin/pint --test

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright's dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Test with pest
        run: vendor/bin/pest --parallel --coverage-clover ./coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: yilanboy/docfunc
